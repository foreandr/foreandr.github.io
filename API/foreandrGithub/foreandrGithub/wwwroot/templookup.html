<!DOCTYPE html>
<html>
<head>
    <title>Writer Lookup</title>
    <meta charset="utf-8" />
    <link href="bootstrap/lib/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="mx-2 my-2">
        <div class="card">
            <div class="card-header text-center">
                Writer
            </div>
            <div class="card-body p-0 m1-1">

                <div class="row">
                    <div class="col-3" style="font-weight:bold;">Firstname</div>
                    <div class="col-8" text-left id="firstname"></div>
                </div>

                <div class="row">
                    <div class="col-3" style="font-weight:bold;">Lastname</div>
                    <div class="col-8" text-left id="lastname"></div>
                </div>

                <div class="row">
                    <div class="col-3" style="font-weight:bold;">Date oF Birth</div>
                    <div class="col-8" text-left id="dateofbirth"></div>
                </div>


                <div class="row">
                    <div class="col-3" style="font-weight:bold;">Country</div>
                    <div class="col-8" text-left id="country"></div>

                    <div class="col-8">
                        <input type="text" placeholder="enter first name" id="TextBoxFirstname" class="form-control my-2" />
                    </div>
                </div>


                <div class="card-footer text-center">
                    <input type="button" value="Find Writer" id="getbutton" function="getButton2" />
                    <div id="status" class="text-left mt-3 mb-2"></div>

                </div>
            </div>
        </div>
    </div>
    <script src="jquerybootstrap/lib/js/jquery.min.js"></script>
    <script src="js/studentlookup.js"</script>
</body>
</html>
